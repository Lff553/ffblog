name: Deploy Vue3 to GitHub Pages

on:
  push:
    branches: [ "master" ] # 监听 main 分支的推送
  workflow_dispatch: # 允许在 GitHub 页面上手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # 构建产物目录，Vue 项目默认是 dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4